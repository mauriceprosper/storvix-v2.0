<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay — Storvix</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAFAFF;
      min-height: 100vh;
      margin: 0;
    }
    .pay-shell {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }
    .pay-card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 40px -16px rgba(10,14,26,0.12);
    }

    .pay-brand {
      text-align: center;
      padding-bottom: 22px;
      margin-bottom: 22px;
      border-bottom: 1px solid #F3F4F6;
    }
    .pay-brand img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: cover;
      margin-bottom: 12px;
      border: 1px solid #F3F4F6;
    }
    .pay-store {
      font-size: 0.75rem;
      color: #6B7280;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pay-store strong { color: #111827; font-weight: 700; }
    .pay-desc {
      font-size: 1.0625rem;
      font-weight: 600;
      color: #111827;
      margin: 8px 0 4px;
      line-height: 1.4;
    }
    .pay-notes {
      font-size: 0.875rem;
      color: #6B7280;
      margin: 8px 0 0;
      line-height: 1.5;
      padding: 10px 14px;
      background: #FAFAFA;
      border-radius: 8px;
      text-align: left;
    }
    .pay-amount-wrap {
      padding: 18px;
      background: linear-gradient(135deg, #0066FF 0%, #4F2FE8 100%);
      border-radius: 14px;
      color: white;
      margin-top: 14px;
    }
    .pay-amount-label {
      font-size: 0.7rem;
      opacity: 0.85;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pay-amount {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .pay-amount-sub {
      font-size: 0.75rem;
      opacity: 0.85;
      margin-top: 6px;
    }

    .form-section { margin-bottom: 18px; }
    .form-section h4 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6B7280;
      margin: 0 0 10px;
    }

    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .form-row .hint { color: #9CA3AF; font-weight: 400; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-family: inherit;
      transition: all 0.15s;
      box-sizing: border-box;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      outline: none;
      border-color: #0066FF;
      box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
    }
    .form-row .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .pay-btn:hover { background: #1F2937; transform: translateY(-1px); box-shadow: 0 8px 20px -8px rgba(17,24,39,0.4); }
    .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .trust-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #F3F4F6;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #6B7280;
      font-weight: 500;
    }

    .pay-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 0.75rem;
      color: #9CA3AF;
    }
    .pay-footer a { color: #6B7280; text-decoration: none; }

    /* States */
    .state-icon { font-size: 4rem; margin-bottom: 16px; }
    .state-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .state-text  { color: #6B7280; line-height: 1.55; }

    /* Loader */
    .pay-loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner-pay {
      width: 32px;
      height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #0066FF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .pay-card { padding: 22px 18px; border-radius: 16px; }
      .pay-amount { font-size: 1.875rem; }
      .form-row .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="storvix-toast"></div>

<!-- Loader -->
<div class="pay-loader" id="pageLoader"><div class="spinner-pay"></div></div>

<!-- Payment Card -->
<div class="pay-shell" id="payPage" style="display:none">
  <div class="pay-card">
    <div class="pay-brand">
      <img id="paySellerLogo" src="assets/logo.png" alt="">
      <div class="pay-store">Pay <strong id="paySellerName">…</strong></div>
      <div class="pay-desc" id="payDescription">…</div>
      <div class="pay-notes" id="payNotes" style="display:none"></div>
      <div class="pay-amount-wrap">
        <div class="pay-amount-label">Amount due</div>
        <div class="pay-amount" id="payAmount">₦0</div>
        <div class="pay-amount-sub" id="payAmountSub">+ ₦100 service fee</div>
      </div>
    </div>

    <form id="payForm">
      <div class="form-section">
        <h4>Your details</h4>
        <div class="form-row">
          <label>Full name *</label>
          <input type="text" id="payerName" placeholder="Adekunle Ade" autocomplete="name" required>
        </div>
        <div class="form-row">
          <label>WhatsApp number *</label>
          <input type="tel" id="payerPhone" placeholder="0801 234 5678" autocomplete="tel" required>
        </div>
        <div class="form-row" id="emailRow">
          <label>Email <span class="hint" id="emailHint">(optional, for receipt)</span></label>
          <input type="email" id="payerEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="form-section" id="addressSection" style="display:none">
        <h4>Delivery address</h4>
        <div class="form-row">
          <label>Street address *</label>
          <input type="text" id="payerStreet" placeholder="12 Adeola Odeku Street">
        </div>
        <div class="form-row">
          <div class="row-2">
            <div>
              <label>City *</label>
              <input type="text" id="payerCity" placeholder="Lagos">
            </div>
            <div>
              <label>State *</label>
              <select id="payerState">
                <option value="">Select state</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="pay-btn" id="payNowBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
        Pay <span id="payBtnAmount">₦0</span>
      </button>
    </form>

    <div class="trust-row">
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Secured by Paystack
      </div>
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Card · Transfer · USSD
      </div>
    </div>
  </div>
</div>

<!-- Result State -->
<div class="pay-shell" id="payStatePage" style="display:none">
  <div class="pay-card" style="text-align:center">
    <div class="state-icon" id="payStateIcon">🔒</div>
    <h2 class="state-title" id="payStateTitle">…</h2>
    <p class="state-text" id="payStateText">…</p>
    <div id="payStateActions" style="margin-top:24px"></div>
  </div>
</div>

<div class="pay-footer">
  Powered by <a href="https://storvix.ng">Storvix</a>
</div>

<script type="module">
import {
  db, doc, getDoc, getDocs, collection, query, where, limit,
  updateDoc, setDoc, serverTimestamp, addDoc, increment, writeBatch
} from "./js/firebase-config.js";
import {
  fmt, toast, getParam, normalisePhone, isValidPhone, isValidEmail,
  generateOrderNumber, NIGERIAN_STATES
} from "./js/utils.js";
import { PAYSTACK_PUBLIC_KEY } from "./js/plans.js";

const ref = getParam("ref");

async function init() {
  if (!ref) return showState("⚠️", "Invalid link", "This payment link is missing a reference.");

  // Find link by ref
  let linkDoc = null;
  let sellerData = null;

  try {
    const sellersSnap = await getDocs(collection(db, "sellers"));
    for (const s of sellersSnap.docs) {
      const linksSnap = await getDocs(query(collection(db, "sellers", s.id, "paymentLinks"), where("ref","==",ref), limit(1)));
      if (!linksSnap.empty) {
        linkDoc = { id: linksSnap.docs[0].id, sellerId: s.id, ...linksSnap.docs[0].data() };
        sellerData = { id: s.id, ...s.data() };
        break;
      }
    }
  } catch (e) { console.error(e); }

  if (!linkDoc) return showState("😕", "Link not found", "This payment link doesn't exist or has been removed by the seller.");
  if (linkDoc.used && linkDoc.oneTime) return showState("🔒", "Link already used", "This one-time payment link has already been used. Contact the seller for a new link.");
  if (linkDoc.expiryDate && new Date(linkDoc.expiryDate) < new Date()) return showState("⏰", "Link expired", "This payment link has expired.");

  // Render
  document.getElementById("pageLoader").style.display = "none";
  document.getElementById("payPage").style.display = "";

  if (sellerData.logoUrl) {
    document.getElementById("paySellerLogo").src = sellerData.logoUrl;
  }

  document.title = `Pay ${sellerData.storeName} ${fmt(linkDoc.amount)} — Storvix`;
  document.getElementById("paySellerName").textContent  = sellerData.storeName || "Seller";
  document.getElementById("payDescription").textContent = linkDoc.description || "Payment";
  document.getElementById("payAmount").textContent      = fmt(linkDoc.amount);
  document.getElementById("payBtnAmount").textContent   = fmt(linkDoc.amount + 100);

  // Notes (optional)
  if (linkDoc.notes) {
    document.getElementById("payNotes").style.display = "";
    document.getElementById("payNotes").textContent = linkDoc.notes;
  }

  // Required fields
  if (linkDoc.requireEmail) {
    document.getElementById("payerEmail").required = true;
    document.getElementById("emailHint").textContent = "*";
    document.getElementById("emailHint").style.color = "#EF4444";
  }
  if (linkDoc.requireAddress) {
    document.getElementById("addressSection").style.display = "";
    document.getElementById("payerStreet").required = true;
    document.getElementById("payerCity").required = true;
    document.getElementById("payerState").required = true;

    const stateSel = document.getElementById("payerState");
    NIGERIAN_STATES.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      stateSel.appendChild(opt);
    });
  }

  // Submit handler
  document.getElementById("payForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn   = document.getElementById("payNowBtn");
    const name  = document.getElementById("payerName").value.trim();
    const phone = normalisePhone(document.getElementById("payerPhone").value.trim());
    const email = document.getElementById("payerEmail").value.trim() || `${phone.replace("+","")}@storvix.ng`;
    const street = document.getElementById("payerStreet")?.value.trim() || "";
    const city   = document.getElementById("payerCity")?.value.trim() || "";
    const state  = document.getElementById("payerState")?.value || "";

    if (!name || !isValidPhone(phone)) { toast("Enter your name and phone number.", "error"); return; }
    if (linkDoc.requireEmail && !isValidEmail(email)) { toast("Enter a valid email.", "error"); return; }
    if (linkDoc.requireAddress && (!street || !city || !state)) { toast("Fill in your delivery address.", "error"); return; }

    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner-pay" style="width:16px;height:16px;border-width:2px"></div> Loading…`;

    const payRef = `STX_PAY_${Date.now()}`;
    const total  = linkDoc.amount + 100; // +₦100 service fee

    const handler = window.PaystackPop.setup({
      key:      PAYSTACK_PUBLIC_KEY,
      email,
      amount:   total * 100, // kobo
      currency: "NGN",
      ref:      payRef,
      metadata: {
        custom_fields: [
          { display_name: "Type",        variable_name: "type",        value: "payment_link" },
          { display_name: "Link Ref",    variable_name: "link_ref",    value: ref },
          { display_name: "Seller ID",   variable_name: "seller_id",   value: sellerData.id },
          { display_name: "Buyer Phone", variable_name: "buyer_phone", value: phone },
        ]
      },
      callback: function (response) {
        // Background: create order doc (so revenue counts) + credit wallet + mark link used
        (async () => {
          try {
            const orderNumber = generateOrderNumber();
            const batch = writeBatch(db);

            // 1. Create an order doc — this is what makes total revenue update
            const orderRef = doc(collection(db, "sellers", sellerData.id, "orders"));
            batch.set(orderRef, {
              orderNumber,
              sellerId: sellerData.id,
              sellerSlug: sellerData.slug,
              source: "payment_link",
              linkRef: ref,
              linkDescription: linkDoc.description,
              buyer: { name, phone, email },
              address: linkDoc.requireAddress ? { street, city, state } : null,
              items: [{
                productId: `link_${ref}`,
                name: linkDoc.description || "Payment",
                price: linkDoc.amount,
                qty: 1,
                variant: "",
              }],
              subtotal:    linkDoc.amount,
              deliveryFee: 0,
              storvixFee:  100,
              total:       total,
              credit:      linkDoc.amount,
              status:        "confirmed",
              paymentStatus: "paid",
              paymentRef:    response.reference,
              createdAt:     serverTimestamp(),
              updatedAt:     serverTimestamp(),
            });

            // 2. Credit wallet (subtotal only — Storvix keeps the ₦100)
            batch.update(doc(db, "sellers", sellerData.id), {
              "wallet.balance":     increment(linkDoc.amount),
              "wallet.totalEarned": increment(linkDoc.amount),
            });

            // 3. Record transaction (deterministic ID = idempotent)
            const txnId = `pay_${response.reference}`;
            batch.set(doc(db, "sellers", sellerData.id, "transactions", txnId), {
              type:        "credit",
              amount:      linkDoc.amount,
              description: `Payment link: ${linkDoc.description || ref}`,
              orderId:     orderRef.id,
              orderNumber,
              paymentRef:  response.reference,
              linkRef:     ref,
              createdAt:   serverTimestamp(),
            });

            // 4. Update payment link
            if (linkDoc.oneTime) {
              batch.update(doc(db, "sellers", sellerData.id, "paymentLinks", linkDoc.id), {
                used: true, usedAt: serverTimestamp(),
                usedBy: { name, phone, email, paymentRef: response.reference },
                paidAt: serverTimestamp(),
              });
            } else {
              batch.update(doc(db, "sellers", sellerData.id, "paymentLinks", linkDoc.id), {
                usageCount: increment(1),
                lastUsedAt: serverTimestamp(),
              });
            }

            // 5. Public orderRefs lookup (for /track.html)
            batch.set(doc(db, "orderRefs", orderNumber), {
              sellerId: sellerData.id,
              orderId:  orderRef.id,
              createdAt: serverTimestamp(),
            });

            await batch.commit();
            console.log(`[Storvix] Payment recorded — order ${orderNumber}, +₦${linkDoc.amount} to wallet`);
            window._lastTrackUrl = `${window.location.origin}/track.html?ref=${orderNumber}`;
          } catch (err) {
            console.error("Post-payment update failed:", err);
          }
        })();

        // Show success state with track button + copy link (no auto-redirect)
        const trackUrl = `${window.location.origin}/track.html?ref=${orderNumber}`;
        showSuccessWithTrackLink(name, sellerData.storeName, linkDoc.amount, trackUrl);
      },
      onClose: function () {
        toast("Payment cancelled.", "info");
        btn.disabled = false;
        btn.innerHTML = originalText;
      },
    });

    handler.openIframe();
  });
}

function showSuccessWithTrackLink(buyerName, storeName, amount, trackUrl) {
  document.getElementById("pageLoader").style.display = "none";
  document.getElementById("payPage").style.display = "none";
  const el = document.getElementById("payStatePage");
  el.style.display = "";
  document.getElementById("payStateIcon").textContent = "🎉";
  document.getElementById("payStateTitle").textContent = "Payment Successful!";
  document.getElementById("payStateText").innerHTML =
    `Thank you, ${buyerName}. Your payment of ${fmt(amount)} to <strong>${storeName}</strong> has been received.`;

  document.getElementById("payStateActions").innerHTML = `
    <div style="margin:18px 0;padding:14px;background:rgba(0,102,255,0.06);border:1px dashed rgba(0,102,255,0.3);border-radius:10px">
      <div style="font-size:.7rem;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Tracking link</div>
      <div style="display:flex;gap:8px">
        <input type="text" readonly id="trackLinkInputPay" value="${trackUrl}"
               style="flex:1;padding:10px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:.8125rem;background:#fff;font-family:monospace;min-width:0">
        <button onclick="copyPayTrackLink(this)"
                style="padding:10px 14px;background:#0066FF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.8125rem;white-space:nowrap">Copy</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <a href="${trackUrl}" class="pay-btn" style="text-decoration:none;display:inline-flex;width:auto;padding:12px 20px">Track My Order →</a>
      <a href="/" class="pay-btn" style="text-decoration:none;display:inline-flex;width:auto;padding:12px 20px;background:#F3F4F6;color:#374151">Done</a>
    </div>
  `;
}

window.copyPayTrackLink = function(btn) {
  const inp = document.getElementById("trackLinkInputPay");
  navigator.clipboard.writeText(inp.value).then(() => {
    const orig = btn.textContent;
    btn.textContent = "✓ Copied";
    btn.style.background = "#10B981";
    setTimeout(() => { btn.textContent = orig; btn.style.background = "#0066FF"; }, 1800);
  });
};

function showState(icon, title, text, actions) {
  document.getElementById("pageLoader").style.display = "none";
  document.getElementById("payPage").style.display = "none";
  const el = document.getElementById("payStatePage");
  el.style.display = "";
  document.getElementById("payStateIcon").textContent = icon;
  document.getElementById("payStateTitle").textContent = title;
  document.getElementById("payStateText").textContent  = text;

  const actionsEl = document.getElementById("payStateActions");
  if (actions?.length) {
    actionsEl.innerHTML = actions.map(a => `
      <button onclick="window.location.href='${a.href || "/"}'" class="pay-btn" style="${a.primary ? '' : 'background:#F3F4F6;color:#374151'}">${a.label}</button>
    `).join("");
  } else {
    actionsEl.innerHTML = "";
  }
}

init();
</script>
</body>
</html>
