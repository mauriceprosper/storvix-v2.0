<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice — Storvix</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<div id="storvix-toast"></div>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>

<div class="invoice-page" id="invoicePage" style="display:none">
  <div class="no-print" style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px">
    <button class="btn btn-secondary" onclick="window.print()">🖨 Print / Save PDF</button>
  </div>

  <div class="invoice-header">
    <div>
      <img id="invoiceLogo" class="invoice-logo" src="" alt="" style="display:none">
      <div style="font-weight:800;font-size:1.5rem" id="invoiceStoreName">—</div>
      <div style="color:var(--text-muted);font-size:.875rem" id="invoiceStoreContact"></div>
    </div>
    <div style="text-align:right">
      <div class="invoice-title">INVOICE</div>
      <div style="font-family:monospace;font-weight:600;margin-top:4px" id="invoiceNumber">—</div>
      <div style="font-size:.875rem;color:var(--text-muted);margin-top:4px" id="invoiceDate">—</div>
    </div>
  </div>

  <div class="invoice-parties">
    <div class="invoice-party">
      <h4>From</h4>
      <div style="font-weight:600" id="invFromName">—</div>
      <div style="font-size:.875rem;color:var(--text-muted)" id="invFromContact"></div>
    </div>
    <div class="invoice-party">
      <h4>To</h4>
      <div style="font-weight:600" id="invToName">—</div>
      <div style="font-size:.875rem;color:var(--text-muted)" id="invToContact"></div>
      <div style="font-size:.875rem;color:var(--text-muted)" id="invToAddress"></div>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <table class="table">
      <thead><tr><th>Item</th><th>Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Total</th></tr></thead>
      <tbody id="invItemsBody"></tbody>
    </table>
  </div>

  <div class="invoice-totals">
    <div class="invoice-total-row"><span>Subtotal</span><span id="invSubtotal">₦0</span></div>
    <div class="invoice-total-row" id="invDeliveryRow" style="display:none"><span>Delivery</span><span id="invDelivery">₦0</span></div>
    <div class="invoice-total-row" id="invFeeRow" style="display:none"><span>VAT + Paystack</span><span id="invFee">₦0</span></div>
    <div class="invoice-total-row grand"><span>Total</span><span id="invTotal">₦0</span></div>
  </div>

  <div class="invoice-watermark" id="invWatermark" style="display:none">
    Generated by ⚡ Storvix · storvix.ng
  </div>

  <div class="invoice-footer">
    Thank you for your purchase!<br>
    <span style="font-size:.75rem">Powered by ⚡ Storvix · usestorvix@gmail.com</span>
  </div>
</div>

<script type="module">
import { db, auth, doc, getDoc, onAuthStateChanged } from "./js/firebase-config.js";
import { fmt, fmtDate, getParam } from "./js/utils.js";

const orderId = getParam("orderId");

onAuthStateChanged(auth, async (user) => {
  if (!user || !orderId) {
    document.getElementById("pageLoader").innerHTML = "<p>Invalid invoice link.</p>";
    return;
  }

  try {
    const orderSnap  = await getDoc(doc(db, "sellers", user.uid, "orders", orderId));
    const sellerSnap = await getDoc(doc(db, "sellers", user.uid));

    if (!orderSnap.exists() || !sellerSnap.exists()) {
      document.getElementById("pageLoader").innerHTML = "<p>Invoice not found.</p>";
      return;
    }

    const order  = orderSnap.data();
    const seller = sellerSnap.data();

    // Render
    document.getElementById("pageLoader").style.display = "none";
    document.getElementById("invoicePage").style.display = "";

    if (seller.logoUrl) {
      document.getElementById("invoiceLogo").src = seller.logoUrl;
      document.getElementById("invoiceLogo").style.display = "";
    }
    document.getElementById("invoiceStoreName").textContent    = seller.storeName || "";
    document.getElementById("invoiceStoreContact").textContent = `${seller.email || ""} · ${seller.whatsapp || ""}`;
    document.getElementById("invoiceNumber").textContent       = "#" + (order.orderNumber || orderId);
    document.getElementById("invoiceDate").textContent         = fmtDate(order.createdAt);
    document.getElementById("invFromName").textContent         = seller.storeName || "";
    document.getElementById("invFromContact").textContent      = [seller.city, seller.state].filter(Boolean).join(", ");
    document.getElementById("invToName").textContent           = order.buyer?.name || "—";
    document.getElementById("invToContact").textContent        = `${order.buyer?.phone || ""} ${order.buyer?.email || ""}`;
    document.getElementById("invToAddress").textContent        = [order.address?.street, order.address?.city, order.address?.state].filter(Boolean).join(", ");

    document.getElementById("invItemsBody").innerHTML = (order.items || []).map(i => `
      <tr>
        <td>${i.name}${i.variant ? `<div style="font-size:.8125rem;color:var(--text-muted)">${i.variant}</div>` : ""}</td>
        <td>${i.qty}</td>
        <td style="text-align:right">${fmt(i.price)}</td>
        <td style="text-align:right;font-weight:600">${fmt(i.price * i.qty)}</td>
      </tr>`).join("");

    document.getElementById("invSubtotal").textContent = fmt(order.subtotal || 0);
    if (order.deliveryFee) {
      document.getElementById("invDeliveryRow").style.display = "";
      document.getElementById("invDelivery").textContent = fmt(order.deliveryFee);
    }
    if (order.storvixFee) {
      document.getElementById("invFeeRow").style.display = "";
      document.getElementById("invFee").textContent = fmt(order.storvixFee);
    }
    document.getElementById("invTotal").textContent = fmt(order.total || 0);

    // Watermark for Lite/Basic
    if (["lite","basic"].includes(seller.plan)) {
      document.getElementById("invWatermark").style.display = "";
    }
  } catch (e) {
    console.error(e);
    document.getElementById("pageLoader").innerHTML = "<p>Failed to load invoice.</p>";
  }
});
</script>
</body>
</html>
