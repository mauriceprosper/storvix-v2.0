<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track your order — Storvix</title>
<meta name="description" content="Track your Storvix order status, delivery, and payment confirmation.">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="css/global.css">
<style>
  body { background: linear-gradient(180deg,#FAFAFF 0%,#FFFFFF 100%); min-height:100vh; }
  .track-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
  .track-card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:32px; box-shadow:0 4px 24px -8px rgba(10,14,26,0.06); }
  .track-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .track-header img { width:36px; height:36px; border-radius:8px; }
  .track-search { display:flex; gap:8px; margin-bottom:24px; }
  .track-search input { flex:1; padding:12px 14px; border:1px solid var(--border); border-radius:10px; font-size:1rem; font-family:monospace; text-transform:uppercase; }
  .track-search button { padding:12px 18px; background:var(--accent,#6647FF); color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-size:.9375rem; }

  .order-meta { padding:14px; background:rgba(102,71,255,0.04); border-radius:10px; margin-bottom:20px; }
  .order-meta-row { display:flex; justify-content:space-between; font-size:.875rem; padding:4px 0; }
  .order-meta-row span:first-child { color:var(--text-muted); }
  .order-meta-row span:last-child { font-weight:600; }

  .timeline { position:relative; padding-left:32px; margin:24px 0; }
  .timeline::before { content:""; position:absolute; left:11px; top:8px; bottom:8px; width:2px; background:var(--border); }
  .timeline-step { position:relative; padding-bottom:24px; }
  .timeline-step:last-child { padding-bottom:0; }
  .timeline-step .dot { position:absolute; left:-25px; top:2px; width:24px; height:24px; border-radius:50%; background:#fff; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; color:var(--text-muted); }
  .timeline-step.done .dot { background:var(--accent,#6647FF); border-color:var(--accent,#6647FF); color:#fff; }
  .timeline-step.current .dot { background:#fff; border-color:var(--accent,#6647FF); color:var(--accent,#6647FF); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(102,71,255,0.4)} 50%{box-shadow:0 0 0 8px rgba(102,71,255,0)} }
  .timeline-step .label { font-weight:600; }
  .timeline-step .time { font-size:.75rem; color:var(--text-muted); margin-top:2px; }

  .item-row { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); align-items:center; }
  .item-row:last-child { border:none; }
  .item-row img { width:48px; height:48px; border-radius:8px; object-fit:cover; background:var(--bg-faint); }

  .err-box { padding:24px; text-align:center; color:var(--text-muted); }

  .help-card { margin-top:18px; padding:14px; background:#FFF7E6; border:1px solid #FFD580; border-radius:10px; font-size:.875rem; }
</style>
</head>
<body>

<div class="track-wrap">
  <div class="track-card">
    <div class="track-header">
      <img src="assets/logo.png" alt="">
      <div>
        <h2 style="font-size:1.25rem;margin:0">Track your order</h2>
        <p style="font-size:.875rem;color:var(--text-muted);margin:0">Enter your order number to see status</p>
      </div>
    </div>

    <div class="track-search">
      <input type="text" id="refInput" placeholder="STX-XXXX" maxlength="20" autocomplete="off">
      <button id="searchBtn">Track</button>
    </div>

    <div id="result"></div>
  </div>

  <div style="text-align:center;margin-top:20px;font-size:.8125rem;color:var(--text-muted)">
    <a href="/" style="color:var(--text-muted)">← Back to Storvix</a>
  </div>
</div>

<script type="module">
import { db, collectionGroup, query, where, limit, getDocs } from "./js/firebase-config.js";
import { fmt, fmtDate } from "./js/utils.js";

const inputEl  = document.getElementById("refInput");
const btnEl    = document.getElementById("searchBtn");
const resultEl = document.getElementById("result");

function timeAgo(date) {
  if (!date) return "";
  const d = date.toDate ? date.toDate() : new Date(date);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60)        return "just now";
  if (diff < 3600)      return Math.floor(diff/60) + "m ago";
  if (diff < 86400)     return Math.floor(diff/3600) + "h ago";
  if (diff < 604800)    return Math.floor(diff/86400) + "d ago";
  return d.toLocaleDateString("en-NG", { day:"numeric", month:"short", year:"numeric" });
}

function renderError(msg) {
  resultEl.innerHTML = `<div class="err-box">
    <div style="font-size:2.5rem;margin-bottom:8px">🔍</div>
    <h3 style="margin:0 0 6px">Order not found</h3>
    <p style="font-size:.9375rem">${msg}</p>
  </div>`;
}

function renderOrder(order) {
  const status = order.status || "pending";
  const stages = [
    { key: "pending",     label: "Order placed",      desc: "We've received your order" },
    { key: "confirmed",   label: "Payment confirmed", desc: "Your payment has been received" },
    { key: "processing",  label: "Being prepared",    desc: "Seller is preparing your order" },
    { key: "shipped",     label: "Shipped",           desc: "On the way to you" },
    { key: "delivered",   label: "Delivered",         desc: "Order completed" },
  ];

  // If cancelled, show that
  if (status === "cancelled" || order.paymentStatus === "failed") {
    resultEl.innerHTML = `
      <div class="err-box">
        <div style="font-size:2.5rem">❌</div>
        <h3>Order cancelled</h3>
        <p style="font-size:.9375rem">This order was cancelled. If this is a mistake, contact the seller.</p>
      </div>`;
    return;
  }

  const currentIdx = stages.findIndex(s => s.key === status);
  const idx = currentIdx === -1 ? 0 : currentIdx;

  const itemsHtml = (order.items || []).map(i => `
    <div class="item-row">
      <div style="flex:1">
        <div style="font-weight:600;font-size:.9375rem">${i.name}</div>
        <div style="font-size:.8125rem;color:var(--text-muted)">
          ${i.variant || ""} ${i.variant ? "·" : ""} Qty: ${i.qty}
        </div>
      </div>
      <div style="font-weight:700">${fmt(i.price * i.qty)}</div>
    </div>`).join("");

  resultEl.innerHTML = `
    <div class="order-meta">
      <div class="order-meta-row"><span>Order number</span><span style="font-family:monospace">${order.orderNumber}</span></div>
      <div class="order-meta-row"><span>Placed</span><span>${timeAgo(order.createdAt)}</span></div>
      <div class="order-meta-row"><span>Total</span><span>${fmt(order.total || 0)}</span></div>
      ${order.deliveryCourier ? `<div class="order-meta-row"><span>Delivery</span><span>${order.deliveryCourier}</span></div>` : ""}
    </div>

    <div style="display:flex;gap:8px;align-items:center;padding:12px;background:#fff;border:1px dashed #D1D5DB;border-radius:10px;margin-bottom:18px">
      <input type="text" id="copyLinkInput" readonly value="${window.location.origin}/track.html?ref=${order.orderNumber}"
             style="flex:1;border:none;background:transparent;font-family:monospace;font-size:.8125rem;outline:none;min-width:0">
      <button onclick="copyTrackingLink(this)" style="padding:8px 14px;background:var(--accent,#6647FF);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.8125rem;white-space:nowrap">Copy link</button>
    </div>

    <div class="timeline">
      ${stages.map((s, i) => `
        <div class="timeline-step ${i < idx ? "done" : i === idx ? "current" : ""}">
          <div class="dot">${i < idx ? "✓" : i + 1}</div>
          <div class="label">${s.label}</div>
          <div class="time">${i < idx ? "Completed" : i === idx ? "In progress" : s.desc}</div>
        </div>
      `).join("")}
    </div>

    <div style="margin-top:24px">
      <h4 style="font-size:.9375rem;margin:0 0 8px">Items (${(order.items || []).length})</h4>
      ${itemsHtml}
    </div>

    <div class="help-card">
      <strong>Need help?</strong> Contact the seller directly on WhatsApp or message them through their store page.
    </div>`;
}

async function searchOrder(ref) {
  if (!ref) return;
  resultEl.innerHTML = `<div class="err-box"><div style="font-size:1.5rem">⏳</div><p>Looking up your order…</p></div>`;
  try {
    const q = query(collectionGroup(db, "orders"), where("orderNumber", "==", ref), limit(1));
    const snap = await getDocs(q);
    if (snap.empty) {
      renderError(`We couldn't find an order with reference "${ref}". Check the number and try again.`);
      return;
    }
    renderOrder(snap.docs[0].data());
  } catch (err) {
    console.error(err);
    renderError("Something went wrong. Please try again.");
  }
}

btnEl.addEventListener("click", () => searchOrder(inputEl.value.trim().toUpperCase()));
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); searchOrder(inputEl.value.trim().toUpperCase()); }
});

// Auto-search if ref in URL
const urlRef = new URLSearchParams(window.location.search).get("ref");
if (urlRef) {
  inputEl.value = urlRef.toUpperCase();
  searchOrder(urlRef.trim().toUpperCase());
}

// Copy tracking link
window.copyTrackingLink = (btn) => {
  const inp = document.getElementById("copyLinkInput");
  if (!inp) return;
  navigator.clipboard.writeText(inp.value).then(() => {
    const orig = btn.textContent;
    btn.textContent = "✓ Copied";
    btn.style.background = "#10B981";
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = "";
    }, 1800);
  }).catch(() => {
    inp.select();
    document.execCommand("copy");
    btn.textContent = "✓ Copied";
  });
};
</script>
</body>
</html>
