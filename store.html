<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Store — Storvix</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/store.css">
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <meta id="metaDesc" name="description" content="">
  <meta id="ogTitle" property="og:title" content="">
  <meta id="ogImage" property="og:image" content="">
</head>
<body>
<div id="storvix-toast"></div>
<div class="page-loader" id="pageLoader">
  <div class="spinner"></div>
</div>

<!-- Store State: offline / holiday (shown conditionally) -->
<div id="storeStatePage" style="display:none"></div>

<!-- ── STORVIX BRANDING BAR (Lite plan) ── -->
<div class="storvix-bar" id="poweredBar" style="display:none">
  Powered by <a href="https://storvix.ng" target="_blank">⚡ Storvix</a>
</div>

<!-- ── HEADER ── -->
<header class="store-header" id="storeHeader" style="display:none">
  <div class="store-header-brand">
    <img class="store-logo" id="headerLogo" src="" alt="">
    <div>
      <div class="store-name" id="headerStoreName">—</div>
      <div class="store-city" id="headerCity">Nigeria</div>
    </div>
  </div>
  <button class="cart-btn" id="cartBtn">
    🛒 Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<!-- ── HERO ── -->
<div class="store-hero" id="storeHero" style="display:none">
  <div class="store-hero-content">
    <div class="store-hero-name" id="heroStoreName">—</div>
    <div class="store-hero-tagline" id="heroTagline"></div>
    <button class="btn-cta" onclick="document.querySelector('.store-products')?.scrollIntoView({behavior:'smooth'})">Shop Now →</button>
  </div>
</div>

<!-- ── CATEGORY FILTER ── -->
<div class="category-filter" id="categoryFilter" style="display:none">
  <button class="cat-btn active" data-cat="all">All Products</button>
  <!-- more injected by JS -->
</div>

<!-- ── PRODUCTS ── -->
<div class="store-products" id="productsSection" style="display:none">
  <div class="products-heading">Products</div>
  <div class="store-grid" id="productGrid">
    <div class="page-loader" style="position:relative;min-height:200px"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── TESTIMONIALS ── -->
<div class="store-testimonials" id="testimonialsSection" style="display:none">
  <h2 class="section-title">What customers say</h2>
  <div class="testimonials-grid" id="testimonialsGrid"></div>
</div>

<!-- ── FOOTER ── -->
<footer class="store-footer" id="storeFooter" style="display:none">
  <div class="store-footer-inner">
    <div class="footer-brand">
      <img class="store-logo-footer" id="footerLogo" src="" alt="">
      <p class="about-text" id="footerAbout"></p>
      <div class="footer-social" id="footerSocial"></div>
    </div>
    <div class="footer-contact">
      <p id="footerWhatsApp"></p>
    </div>
  </div>
  <div class="storvix-watermark" id="storvixWatermark" style="display:none">
    Powered by <a href="https://storvix.ng" target="_blank">⚡ Storvix</a>
  </div>
</footer>

<!-- ── CART DRAWER ── -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title">Your Cart</div>
    <div class="cart-close" id="cartClose">×</div>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="empty-state" style="padding:48px">
      <div class="empty-icon">🛒</div>
      <h4>Your cart is empty</h4>
    </div>
  </div>
  <div class="cart-footer" id="cartFooterEl">
    <div class="cart-summary" id="cartSummary"></div>
    <button class="btn-checkout" id="checkoutBtn" disabled>Proceed to Checkout</button>
  </div>
</div>

<!-- ── PRODUCT DETAIL MODAL ── -->
<div class="product-modal" id="productDetailModal">
  <div class="product-modal-box">
    <button onclick="closeProductModal()" style="position:absolute;top:16px;right:16px;background:rgba(0,0,0,0.3);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:1.25rem;cursor:pointer;z-index:1">×</button>
    <div class="product-modal-body" id="productModalBody"></div>
  </div>
</div>

<!-- ── CHECKOUT MODAL ── -->
<div class="checkout-modal" id="checkoutModal">
  <div class="checkout-box">
    <div class="checkout-header">
      <div>
        <div class="checkout-title" id="checkoutTitle">Your Details</div>
        <div style="font-size:.8125rem;color:var(--text-muted)" id="checkoutSubtitle">Step 1 of 3</div>
      </div>
      <div class="checkout-step-indicator">
        <div class="checkout-dot active" id="dot1"></div>
        <div class="checkout-dot" id="dot2"></div>
        <div class="checkout-dot" id="dot3"></div>
      </div>
    </div>

    <div class="checkout-body">
      <!-- Step 1: Buyer Info -->
      <div class="checkout-section active" id="checkoutStep1">
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group">
            <label class="form-label">Full name *</label>
            <input class="form-input" type="text" id="buyerName" placeholder="Tunde Williams">
          </div>
          <div class="form-group">
            <label class="form-label">WhatsApp number *</label>
            <input class="form-input" type="tel" id="buyerPhone" placeholder="+234 806 123 4567">
          </div>
          <div class="form-group">
            <label class="form-label">Email <span style="color:var(--text-faint);font-weight:400">(optional)</span></label>
            <input class="form-input" type="email" id="buyerEmail" placeholder="you@example.com">
          </div>
        </div>
      </div>

      <!-- Step 2: Delivery -->
      <div class="checkout-section" id="checkoutStep2">
        <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:16px">
          <div class="form-group">
            <label class="form-label">Street address *</label>
            <input class="form-input" type="text" id="buyerStreet" placeholder="12 Adeola Odeku Street">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">City *</label>
              <input class="form-input" type="text" id="buyerCity" placeholder="Lagos">
            </div>
            <div class="form-group">
              <label class="form-label">State *</label>
              <select class="form-select" id="buyerState">
                <option value="">Select…</option>
              </select>
            </div>
          </div>
        </div>
        <div id="courierSection">
          <label class="form-label" style="margin-bottom:10px">Choose delivery courier</label>
          <div class="courier-options" id="courierOptions">
            <div style="text-align:center;padding:24px;color:var(--text-muted)">Fetching delivery rates…</div>
          </div>
        </div>
      </div>

      <!-- Step 3: Summary + Pay -->
      <div class="checkout-section" id="checkoutStep3">
        <div id="orderSummary"></div>
        <div class="alert alert-info" style="margin-top:16px">
          🔒 Secured by Paystack — card, transfer, USSD accepted
        </div>
      </div>
    </div>

    <div class="checkout-footer">
      <button class="btn btn-secondary" id="checkoutBackBtn" style="display:none">← Back</button>
      <button class="btn btn-primary" id="checkoutNextBtn" style="margin-left:auto">Continue →</button>
    </div>
  </div>
</div>

<script type="module" src="/js/store.js"></script>
</body>
</html>
